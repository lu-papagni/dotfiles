packages:
  unix:
    common:
      - bat
      - btop
      - curl
      - fzf
      - gcc
      - git
      - git-delta
      - lazygit
      - neovim
      - ripgrep
      - tar
      - tmux
      - tree
      - zsh
    gui:
      - kitty
  windows:
    - Brave.Brave
    - Discord.Discord
    - KDE.KDEConnect
    - KDE.Okular
    - MartiCliment.UniGetUI
    - Microsoft.PowerShell
    - Microsoft.PowerToys
    - Microsoft.WindowsTerminal
    - ONLYOFFICE.DesktopEditors
    - Obsidian.Obsidian
    - REALiX.HWiNFO
    - Rclone.Rclone
    - RevoUninstaller.RevoUninstaller
    - VideoLAN.VLC
    - WinFsp.WinFsp
    - WinSCP.WinSCP
    - CrystalDewWorld.CrystalDiskInfo
    - jtroo.kanata_gui
    - nomacs.nomacs
    - '9NKSQGP7F2NH'  # WhatsApp
  npm:
    - opencode-ai
    - tree-sitter-cli

tools:
  shell: zsh
  editor: nvim

treesitter:
  'tree-sitter-grammars/tree-sitter-markdown':  # Repo slug
    tree-sitter-markdown: markdown  # Folder -> parser name mapping
    tree-sitter-markdown-inline: markdown_inline
  'tree-sitter/tree-sitter-typescript':
    tsx: tsx
    typescript: typescript
  'tree-sitter/tree-sitter-bash':
    .: bash
  'ngalaiko/tree-sitter-go-template':
    .: gotmpl
  'tree-sitter/tree-sitter-javascript':
    .: javascript
  'tree-sitter/tree-sitter-python':
    .: python
  'tree-sitter-grammars/tree-sitter-yaml':
    .: yaml
  'tree-sitter-grammars/tree-sitter-lua':
    .: lua

wsl:
  config:
    boot:
      systemd: true
    interop:
      appendWindowsPath: false
  # Reference at https://man7.org/linux/man-pages/man5/fstab.5.html
  fstab:
    - spec: 'tmpfs'
      file: '/tmp'
      vfstype: tmpfs
      mntops: ['defaults','nodev','nosuid','noatime','size=256m']
      freq: 0
      passno: 0

pathEntries:
  - '$HOME/.local/bin'
  - '$HOME/.bun/bin'
  - '$HOME/.cache/.bun/bin'
