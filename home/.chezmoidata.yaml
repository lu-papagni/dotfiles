packages:
  unix:
    common:
      - bat
      - btop
      - fzf
      - gcc
      - git
      - git-delta
      - lazygit
      - neovim
      - ripgrep
      - tar
      - tmux
      - tree
      - zsh
    gui:
      - kitty
  windows:
    winget:
      - Brave.Brave
      - Discord.Discord
      - KDE.KDEConnect
      - KDE.Okular
      - MartiCliment.UniGetUI
      - Microsoft.PowerShell
      - Microsoft.PowerToys
      - Microsoft.WindowsTerminal
      - ONLYOFFICE.DesktopEditors
      - Obsidian.Obsidian
      - REALiX.HWiNFO
      - Rclone.Rclone
      - RevoUninstaller.RevoUninstaller
      - VideoLAN.VLC
      - WinFsp.WinFsp
      - WinSCP.WinSCP
      - WsSolInfor.CrystalDiskInfo
      - jtroo.kanata_gui
      - nomacs.nomacs
    msstore:
      - 9NKSQGP7F2NH  # WhatsApp
  npm:
    - opencode-ai
    - tree-sitter-cli

tools:
  shell: zsh
  editor: nvim

wsl:
  config:
    boot:
      systemd: true
    interop:
      appendWindowsPath: false
  # Reference at https://man7.org/linux/man-pages/man5/fstab.5.html
  fstab:
    - spec: 'tmpfs'
      file: '/tmp'
      vfstype: tmpfs
      mntops: ['defaults','nodev','nosuid','noatime','size=256m']
      freq: 0
      passno: 0

pathEntries:
  - '$HOME/.local/bin'
  - '$HOME/.bun/bin'
  - '$HOME/.cache/.bun/bin'
